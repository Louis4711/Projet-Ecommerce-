<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orinoco - Commande confirmée</title>
  <meta name="description" content="Merci pour votre commande sur Orinoco.">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <div class="container nav-container">
      <a href="index.html" class="logo">Orinoco</a>
      <nav class="nav-links">
        <a href="cart.html" class="cart-icon">
          Panier <span id="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div style="max-width: 600px; margin: 0 auto; text-align: center; padding: 4rem 2rem; background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-md);">
      <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
      <h1 style="margin-bottom: 1.5rem;">Merci pour votre commande !</h1>
      <p style="font-size: 1.125rem; color: var(--text-muted); margin-bottom: 2rem;">
        Votre commande a bien été enregistrée et sera traitée dans les plus brefs délais.
      </p>
      
      <div style="background: var(--bg-color); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; text-align: left;">
        <div style="margin-bottom: 0.5rem;">
          <span style="font-weight: 600;">Numéro de commande :</span>
          <span id="order-id" style="color: var(--primary-color); word-break: break-all;">Chargement...</span>
        </div>
        <div>
          <span style="font-weight: 600;">Montant total :</span>
          <span id="order-price" style="font-weight: 700;">Chargement...</span>
        </div>
      </div>
      
      <a href="index.html" class="btn">Retour à l'accueil</a>
    </div>
  </main>



  <script src="./js/api.js"></script>
  <script src="./js/confirm.js"></script>
</body>
</html>
